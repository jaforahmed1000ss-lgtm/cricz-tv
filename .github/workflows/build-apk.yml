name: Build CricZ TV APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  GRADLE_USER_HOME: /tmp/gradle-home
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=false -Dorg.gradle.configuration-cache=false -Dfile.encoding=UTF-8"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Get dependencies
        run: flutter pub get


        - name: Patch media_kit_video for Flutter 3.24 API
          run: |
            FILE=$(find $HOME/.pub-cache -name "VideoOutput.java" -path "*/media_kit_video*" 2>/dev/null | head -1)
            if [ -n "$FILE" ]; then
              echo "Patching $FILE"
              sed -i 's/onSurfaceAvailable/onSurfaceCreated/g' "$FILE"
              sed -i 's/onSurfaceCleanup/onSurfaceDestroyed/g' "$FILE"
              echo "Patch applied successfully"
            else
              echo "VideoOutput.java not found, skipping patch"
            fi
        - name: Patch plugins for AGP 8.x
        run: |
          for f in $(find $HOME/.pub-cache/hosted/pub.dev -name 'build.gradle'); do
            if grep -q 'flutter\.compileSdkVersion\|flutter\.targetSdkVersion\|flutter\.minSdkVersion' "$f"; then
              echo "Patching $f"
              sed -i 's/flutter\.compileSdkVersion/36/g' "$f"
              sed -i 's/flutter\.targetSdkVersion/36/g' "$f"
              sed -i 's/flutter\.minSdkVersion/21/g' "$f"
            fi
          done

      - name: Build Release APK
        run: flutter build apk --release --no-shrink

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: CricZ-TV-Release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CricZ-TV-Debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
