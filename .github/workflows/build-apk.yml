name: Build CricZ TV APK

  on:
    push:
      branches: [ main ]
    workflow_dispatch:

  env:
    GRADLE_USER_HOME: /tmp/gradle-home
    GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=false -Dorg.gradle.configuration-cache=false -Dfile.encoding=UTF-8"

  jobs:
    build:
      runs-on: ubuntu-22.04

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Setup Java 17
          uses: actions/setup-java@v4
          with:
            distribution: zulu
            java-version: "17"

        - name: Setup Flutter
          uses: subosito/flutter-action@v2
          with:
            flutter-version: '3.24.5'
            channel: stable
            cache: true

        - name: Setup Android NDK
          uses: nttld/setup-ndk@v1
          with:
            ndk-version: r27

        - name: Get dependencies
          run: flutter pub get

        - name: Patch plugin build.gradle files for AGP 8.x
          run: |
            python3 - <<'EOF'
            import os, re, glob

            patterns = [
                (r'flutter.compileSdkVersion', '36'),
                (r'flutter.targetSdkVersion', '36'),
                (r'flutter.minSdkVersion', '21'),
            ]

            pub_cache = os.path.expanduser('~/.pub-cache/hosted/pub.dev')
            for gradle_file in glob.glob(f'{pub_cache}/**/build.gradle', recursive=True):
                with open(gradle_file, 'r') as f:
                    content = f.read()
                new_content = content
                for pattern, replacement in patterns:
                    new_content = re.sub(pattern, replacement, new_content)
                if new_content != content:
                    print(f'Patched: {gradle_file}')
                    with open(gradle_file, 'w') as f:
                        f.write(new_content)
            EOF

        - name: Build Release APK
          run: flutter build apk --release --no-shrink

        - name: Upload Release APK
          uses: actions/upload-artifact@v4
          with:
            name: CricZ-TV-Release
            path: build/app/outputs/flutter-apk/app-release.apk
            retention-days: 30

        - name: Build Debug APK
          run: flutter build apk --debug

        - name: Upload Debug APK
          uses: actions/upload-artifact@v4
          with:
            name: CricZ-TV-Debug
            path: build/app/outputs/flutter-apk/app-debug.apk
            retention-days: 7
  